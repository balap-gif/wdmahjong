    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, updateDoc, query, where, addDoc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updatePassword, sendPasswordResetEmail, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBAxo25KJy_XTIZBGYOh_XMTcn0w73yiYM",
            authDomain: "izinstaf-82315.firebaseapp.com",
            projectId: "izinstaf-82315",
            storageBucket: "izinstaf-82315.firebasestorage.app",
            messagingSenderId: "984406077560",
            appId: "1:984406077560:web:79501d7cd9d86062983d8d",
            measurementId: "G-25WVSLDCK4"
        };

        // Inisialisasi
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // EXPOSE GLOBAL untuk akses dari fungsi inline
        window.db = db;
        window.auth = auth;
        window.Timestamp = Timestamp;
        window.getDocs = getDocs;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.updateDoc = updateDoc;
        window.collection = collection;
        window.query = query;
        window.where = where;
        window.addDoc = addDoc;
        window.deleteDoc = deleteDoc;
        window.signOut = signOut;
        window.updatePassword = updatePassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
    </script>

<body>
<div class="login-wrapper" id="loginWrapper">
    <div class="glass-card">
        <h2>✨ IZIN KELUAR STAFF ✨</h2>
        <div class="input-group">
            <label>📧 Email / Nama Staf</label>
            <input type="text" id="loginEmail" placeholder="contoh@email.com atau nama staf">
        </div>
        <div class="input-group">
            <label>🔒 Password</label>
            <input type="password" id="loginPassword" placeholder="********">
        </div>
        <button id="loginBtn">MASUK DASHBOARD</button>
        <p style="font-size:12px; text-align:center; margin-top:16px;">*Leader wajib daftarkan staf via panel leader</p>
    </div>
</div>

<div class="dashboard-panel" id="dashboardPanel">
    <div class="top-bar">
        <div><span style="font-weight:bold;">🔥 Hokbentoto Izin Keluar</span></div>
        <div class="user-info" id="userRoleDisplay">Role: -</div>
        <button id="logoutBtnGlobal" class="logout-btn" style="width:auto; padding:6px 20px;">🚪 Keluar</button>
    </div>
    <div class="panel-grid">
        <div class="sidebar-nav" id="sidebarNav"></div>
        <div class="main-content" id="mainContent"></div>
    </div>
</div>

<script type="module">
    // ======================== GLOBAL STATE ========================
    let currentUser = null;      // { uid, email, role, name, displayName }
    let allStaffList = [];       // untuk keperluan edit, tampilan
    let izinRecords = [];        // history izin
    
    // fungsi helper simpan ke firestore
    async function loadStaffData() {
        if (!window.db) return;
        const snapshot = await getDocs(collection(db, "staff"));
        allStaffList = [];
        snapshot.forEach(docSnap => {
            allStaffList.push({ id: docSnap.id, ...docSnap.data() });
        });
    }
    
    async function loadIzinHistory() {
        const snap = await getDocs(collection(db, "izinKeluar"));
        izinRecords = [];
        snap.forEach(d => izinRecords.push({ id: d.id, ...d.data() }));
        izinRecords.sort((a,b) => b.timestamp?.toDate?.() - a.timestamp?.toDate?.());
    }
    
    // cek terlambat (lebih dari durasi)
    function isLate(izin) {
        if (!izin.keluarTime || !izin.tujuan) return false;
        const durasiMax = izin.tujuan === "Izin Merokok" ? 20 : 15;
        const keluar = izin.keluarTime.toDate ? izin.keluarTime.toDate() : new Date(izin.keluarTime);
        const sekarang = new Date();
        const diffMenit = (sekarang - keluar) / (1000 * 60);
        return diffMenit > durasiMax && !izin.kembaliDiakui;
    }
    
    async function renderDashboard(activeTab = "izinKeluar") {
        if (!currentUser) return;
        // Sidebar sesuai role
        let sidebarHtml = '';
        if (currentUser.role === 'LEADER') {
            sidebarHtml = `
                <button data-tab="izinKeluar">📋 Izin Keluar / Masuk</button>
                <button data-tab="riwayat">📜 Riwayat Izin</button>
                <button data-tab="dataKemarin">📆 Data Kemarin</button>
                <button data-tab="kelolaStaff">👥 Kelola Staff</button>
                <button data-tab="jobdeks">📋 Jobdeks & Shift</button>
                <button data-tab="gantiPassword">🔐 Ganti Password</button>
            `;
        } else if (currentUser.role === 'CS LINE') {
            sidebarHtml = `
                <button data-tab="izinKeluar">🚬 Izin Keluar / Masuk</button>
                <button data-tab="riwayat">📜 Riwayat Izin</button>
                <button data-tab="dataKemarin">📆 Data Kemarin</button>
                <button data-tab="jobdeks">📋 Jobdeks & Shift</button>
                <button data-tab="gantiPassword">🔐 Ganti Password</button>
            `;
        } else if (currentUser.role === 'CS LiveChat' || currentUser.role === 'KKS' || currentUser.role === 'KASIR') {
            sidebarHtml = `
                <button data-tab="izinKeluar">🚬 Izin Keluar / Masuk</button>
                <button data-tab="riwayat">📜 Riwayat Izin</button>
                <button data-tab="jobdeks">📋 Jobdeks & Shift</button>
                <button data-tab="gantiPassword">🔐 Ganti Password</button>
            `;
        }
        document.getElementById('sidebarNav').innerHTML = sidebarHtml;
        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.addEventListener('click', () => renderDashboard(btn.dataset.tab));
        });
        
        // render konten
        const main = document.getElementById('mainContent');
        await loadStaffData();
        await loadIzinHistory();
        
        if (activeTab === 'izinKeluar') await renderIzinKeluar(main);
        else if (activeTab === 'riwayat') await renderRiwayat(main);
        else if (activeTab === 'dataKemarin') await renderDataKemarin(main);
        else if (activeTab === 'kelolaStaff' && currentUser.role === 'LEADER') await renderKelolaStaff(main);
        else if (activeTab === 'jobdeks') await renderJobdeksShift(main);
        else if (activeTab === 'gantiPassword') await renderGantiPassword(main);
        else await renderIzinKeluar(main);
    }
    
    async function renderIzinKeluar(container) {
        if (currentUser.role === 'LEADER') {
            container.innerHTML = `<div class="card-title">👑 LEADER - Monitoring Izin Staff</div>
            <p style="margin-bottom:10px;">Leader tidak dapat mengisi izin keluar, hanya melihat daftar staf yang sedang izin & terlambat.</p>
            <table><tr><th>Nama</th><th>Tujuan</th><th>Jam Keluar</th><th>Status</th><th>Aksi</th></tr>
            ${izinRecords.filter(iz => !iz.kembaliDiakui).map(iz => {
                const staff = allStaffList.find(s => s.uid === iz.uidStaf) || { name: iz.namaStaf || "Unknown" };
                const late = isLate(iz);
                return `<tr><td>${staff.name}</td><td>${iz.tujuan}</td><td>${iz.keluarTime?.toDate?.()?.toLocaleTimeString() || '-'}</td>
                <td>${late ? '<span class="badge">⚠️ TERLAMBAT</span>' : '⏳ Sedang Izin'}</td>
                <td><button class="btn-small" data-kembali="${iz.id}">Kembalikan (Tutup Izin)</button></td></tr>`;
            }).join('')}</table>`;
            document.querySelectorAll('[data-kembali]').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idIzin = btn.dataset.kembali;
                    await updateDoc(doc(db, "izinKeluar", idIzin), { kembaliDiakui: true, waktuKembali: Timestamp.now() });
                    await loadIzinHistory();
                    renderDashboard('izinKeluar');
                });
            });
            return;
        }
        // role staff
        let izinAktif = izinRecords.find(iz => iz.uidStaf === currentUser.uid && !iz.kembaliDiakui);
        let html = `<div class="card-title">🚬 FORM IZIN KELUAR (${currentUser.role})</div>`;
        if (izinAktif) {
            const lateStatus = isLate(izinAktif) ? '<span class="badge">⚠️ Anda Melebihi Batas Waktu!</span>' : 'Masih dalam durasi izin';
            html += `<div style="background:#FF450030; padding:15px; border-radius:28px;">
            <p>✅ Anda sedang dalam izin: <strong>${izinAktif.tujuan}</strong> sejak ${izinAktif.keluarTime?.toDate?.()?.toLocaleTimeString()}</p>
            <p>${lateStatus}</p>
            <button id="kembaliButton" class="btn-small">🔁 Kembali (Tutup Izin)</button>
            </div>`;
        } else {
            html += `<div class="flex-form">
                <select id="tujuanIzin"><option value="Izin Merokok">Izin Merokok (20 menit)</option><option value="Izin tidak merokok">Izin tidak merokok (15 menit)</option></select>
                <button id="submitIzinKeluar">🚪 KELUAR SEKARANG</button>
            </div>`;
        }
        html += `<hr><h3>Staf Sedang Izin Aktif:</h3><table><tr><th>Nama</th><th>Tujuan</th><th>Jam Keluar</th><th>Status</th></tr>
        ${izinRecords.filter(iz => !iz.kembaliDiakui && iz.uidStaf !== currentUser.uid).map(iz => {
            const staff = allStaffList.find(s=>s.uid===iz.uidStaf) || {name: iz.namaStaf};
            const late = isLate(iz);
            return `<tr><td>${staff.name}</td><td>${iz.tujuan}</td><td>${iz.keluarTime?.toDate?.()?.toLocaleTimeString()}</td><td>${late? 'TERLAMBAT':'Dalam Izin'}</td></tr>`;
        }).join('')}</table>`;
        container.innerHTML = html;
        if(!izinAktif) document.getElementById('submitIzinKeluar')?.addEventListener('click', async()=>{
            const tujuan = document.getElementById('tujuanIzin').value;
            await addDoc(collection(db,"izinKeluar"),{
                uidStaf: currentUser.uid,
                namaStaf: currentUser.name,
                tujuan: tujuan,
                keluarTime: Timestamp.now(),
                kembaliDiakui: false,
                timestamp: Timestamp.now()
            });
            await loadIzinHistory();
            renderDashboard('izinKeluar');
        });
        if(document.getElementById('kembaliButton')) {
            document.getElementById('kembaliButton').addEventListener('click', async()=>{
                if(izinAktif) await updateDoc(doc(db,"izinKeluar", izinAktif.id),{kembaliDiakui:true, waktuKembali: Timestamp.now()});
                await loadIzinHistory();
                renderDashboard('izinKeluar');
            });
        }
    }
    
    async function renderRiwayat(container) {
        await loadIzinHistory();
        let filtered = izinRecords.filter(iz => iz.kembaliDiakui === true);
        if(currentUser.role !== 'LEADER' && currentUser.role !== 'CS LINE') {
            filtered = filtered.filter(iz => iz.uidStaf === currentUser.uid);
        }
        container.innerHTML = `<div class="card-title">📜 Riwayat Izin Keluar</div>
        <table><tr><th>Nama Staff</th><th>Tujuan</th><th>Keluar</th><th>Kembali</th><th>Durasi</th></tr>
        ${filtered.map(iz => {
            const staff = allStaffList.find(s=>s.uid===iz.uidStaf)||{name:iz.namaStaf};
            const keluarDate = iz.keluarTime?.toDate?.() || new Date();
            const kembaliDate = iz.waktuKembali?.toDate?.() || new Date();
            const menit = Math.round((kembaliDate - keluarDate)/60000);
            return `<tr><td>${staff.name}</td><td>${iz.tujuan}</td><td>${keluarDate.toLocaleTimeString()}</td><td>${kembaliDate.toLocaleTimeString()}</td><td>${menit} menit</td></tr>`;
        }).join('')}</table>`;
    }
    
    async function renderDataKemarin(container) {
        if(currentUser.role !== 'LEADER' && currentUser.role !== 'CS LINE') {
            container.innerHTML = `<div class="card-title">⛔ Akses ditolak</div>`;
            return;
        }
        const kemarin = new Date();
        kemarin.setDate(kemarin.getDate()-1);
        kemarin.setHours(0,0,0,0);
        const besok = new Date(kemarin);
        besok.setDate(besok.getDate()+1);
        const snapshot = await getDocs(query(collection(db,"izinKeluar"), where("timestamp",">=", Timestamp.fromDate(kemarin)), where("timestamp","<",Timestamp.fromDate(besok))));
        let dataKemarin = [];
        snapshot.forEach(d=>dataKemarin.push({id:d.id,...d.data()}));
        container.innerHTML = `<div class="card-title">📆 Data Izin Kemarin (${kemarin.toLocaleDateString()})</div>
        <table><tr><th>Staff</th><th>Tujuan</th><th>Waktu Keluar</th><th>Terlambat?</th></tr>
        ${dataKemarin.map(iz=>{
            const staff = allStaffList.find(s=>s.uid===iz.uidStaf)||{name:iz.namaStaf};
            const durMax = iz.tujuan==="Izin Merokok"?20:15;
            const keluar = iz.keluarTime?.toDate?.()||new Date();
            const kembali = iz.waktuKembali?.toDate?.()|| new Date();
            const selisih = (kembali-keluar)/60000;
            const terlambat = selisih > durMax;
            return `<tr><td>${staff.name}</td><td>${iz.tujuan}</td><td>${keluar.toLocaleTimeString()}</td><td>${terlambat ? 'Ya (Lebih dari batas)':'Tepat'}</td></tr>`;
        }).join('')}</table>`;
    }
    
    async function renderKelolaStaff(container) {
        if(currentUser.role !== 'LEADER') return;
        await loadStaffData();
        container.innerHTML = `<div class="card-title">👥 Kelola Staff & Hak Akses</div>
        <div class="flex-form"><input id="staffName" placeholder="Nama Staff"><input id="staffEmail" placeholder="Email Staff"><select id="staffRole"><option>CS LINE</option><option>CS LiveChat</option><option>KKS</option><option>KASIR</option></select><button id="addStaffBtn">Tambah Staff</button></div>
        <table><tr><th>Nama</th><th>Email</th><th>Role</th><th>Aksi</th></tr>
        ${allStaffList.map(s => `<tr><td>${s.name}</td><td>${s.email}</td><td>${s.role}</td><td><button class="editStaffBtn" data-id="${s.id}" data-email="${s.email}" data-name="${s.name}" data-role="${s.role}">✏️ Edit</button> <button class="delStaffBtn" data-id="${s.id}">❌ Hapus</button></td></tr>`).join('')}</table>
        <hr><h3>Atur Shift Kerja (Pagi/Sore/Malam) & Jobdesk</h3>
        <div><textarea id="shiftSetting" placeholder="Contoh: Pagi: 08:00-16:00, Sore: 16:00-00:00, Malam: 00:00-08:00" rows="2"></textarea><button id="saveShiftGlobal">Simpan Shift</button></div>`;
        document.getElementById('addStaffBtn')?.addEventListener('click', async()=>{
            const name = document.getElementById('staffName').value;
            const email = document.getElementById('staffEmail').value;
            const role = document.getElementById('staffRole').value;
            if(!name||!email) return alert("Lengkapi data");
            const defaultPass = "staff123";
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, defaultPass);
                await setDoc(doc(db,"staff", userCred.user.uid), { uid: userCred.user.uid, name, email, role, shift:"Pagi" });
                alert(`Staff ${name} ditambahkan! Password awal: staff123 (bisa diganti)`);
                await loadStaffData();
                renderKelolaStaff(container);
            } catch(e){ alert("Gagal:"+e.message); }
        });
        document.querySelectorAll('.delStaffBtn').forEach(btn=>btn.addEventListener('click', async(e)=>{
            if(confirm("Hapus staff?")) await deleteDoc(doc(db,"staff", btn.dataset.id));
            renderKelolaStaff(container);
        }));
        document.querySelectorAll('.editStaffBtn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                let newRole = prompt("Ubah Role: CS LINE, CS LiveChat, KKS, KASIR", btn.dataset.role);
                if(newRole) updateDoc(doc(db,"staff", btn.dataset.id), {role: newRole}).then(()=>renderKelolaStaff(container));
            });
        });
        document.getElementById('saveShiftGlobal')?.addEventListener('click', async()=>{
            let shiftDesc = document.getElementById('shiftSetting').value;
            await setDoc(doc(db,"config","shiftJobdesk"), { shiftDesc, updated: Timestamp.now() });
            alert("Shift tersimpan");
        });
        const shiftSnap = await getDoc(doc(db,"config","shiftJobdesk"));
        if(shiftSnap.exists()) document.getElementById('shiftSetting') && (document.getElementById('shiftSetting').value = shiftSnap.data().shiftDesc);
    }
    
    async function renderJobdeksShift(container){
        const shiftDoc = await getDoc(doc(db,"config","shiftJobdesk"));
        let shiftData = shiftDoc.exists() ? shiftDoc.data().shiftDesc : "Pagi: 08-16 | Sore: 16-00 | Malam: 00-08";
        container.innerHTML = `<div class="card-title">📋 Jadwal Jobdesk & Shift Kerja</div>
        <p><strong>Shift Kerja Umum:</strong></p><pre style="background:#00000070; padding:12px; border-radius: 24px;">${shiftData}</pre>
        <p><strong>Jobdesk per Role:</strong><br>- CS LINE: Melayani chat & keluhan<br>- CS LiveChat: Respon cepat livechat<br>- KKS: Koordinasi kasir & stock<br>- KASIR: Transaksi dan pembayaran</p>
        ${currentUser.role !== 'LEADER' && currentUser.role !== 'CS LINE' ? '' : '<button id="editJobdeskBtn" class="btn-small">Edit Jobdesk (Leader/CS LINE)</button>'}
        `;
        if(document.getElementById('editJobdeskBtn')){
            document.getElementById('editJobdeskBtn').addEventListener('click',()=>{
                let newJob = prompt("Update jobdesk text:", "CS LINE: ...");
                if(newJob) alert("Simulasi update jobdesk (implementasi lanjut)");
            });
        }
    }
    
    async function renderGantiPassword(container){
        container.innerHTML = `<div class="card-title">🔐 Ganti Password Akun</div>
        <div class="input-group"><label>Password Baru</label><input type="password" id="newPassInput" placeholder="Minimal 6 karakter"></div>
        <div class="input-group"><label>Konfirmasi</label><input type="password" id="confirmPassInput"></div>
        <button id="updatePassBtn">Update Password</button>`;
        document.getElementById('updatePassBtn')?.addEventListener('click', async()=>{
            const newPass = document.getElementById('newPassInput').value;
            const confirm = document.getElementById('confirmPassInput').value;
            if(newPass !== confirm) return alert("Password tidak sama");
            if(newPass.length < 6) return alert("Minimal 6 karakter");
            try {
                await updatePassword(auth.currentUser, newPass);
                alert("Password berhasil diubah!");
                renderDashboard('gantiPassword');
            } catch(e){ alert("Error: "+e.message); }
        });
    }
    
    // LOGIN
    window.loginHandler = async () => {
        const loginInput = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        // cari staff apakah ada email tsb?
        try {
            let emailLogin = loginInput.includes('@') ? loginInput : '';
            if(!emailLogin){
                const staffSnap = await getDocs(collection(db,"staff"));
                let found = null;
                staffSnap.forEach(docS=>{ if(docS.data().name === loginInput) found = docS.data(); });
                if(found && found.email) emailLogin = found.email;
                else throw new Error("Staff tidak terdaftar");
            }
            const userCred = await signInWithEmailAndPassword(auth, emailLogin, password);
            const staffDoc = await getDoc(doc(db,"staff", userCred.user.uid));
            if(!staffDoc.exists()) throw new Error("Akun tidak memiliki akses staff");
            const dataStaff = staffDoc.data();
            currentUser = { uid: userCred.user.uid, email: userCred.user.email, name: dataStaff.name, role: dataStaff.role };
            document.getElementById('userRoleDisplay').innerText = `👤 ${currentUser.name} - ${currentUser.role}`;
            document.getElementById('loginWrapper').style.display = 'none';
            document.getElementById('dashboardPanel').style.display = 'block';
            await loadStaffData(); await loadIzinHistory();
            renderDashboard('izinKeluar');
        } catch(e) { alert("Login gagal: "+e.message); }
    };
    document.getElementById('loginBtn').addEventListener('click', window.loginHandler);
    document.getElementById('logoutBtnGlobal')?.addEventListener('click', async()=>{
        await signOut(auth);
        currentUser = null;
        document.getElementById('loginWrapper').style.display = 'flex';
        document.getElementById('dashboardPanel').style.display = 'none';
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
    });
    // Load leader default jika belum ada staff (opsional) - untuk memudahkan leader pertama
    (async function initFirstLeader(){
        const snapshot = await getDocs(collection(db,"staff"));
        if(snapshot.empty){
            try{
                const leaderEmail = "leader@hokbentoto.com";
                const leaderPass = "leader123";
                const userCred = await createUserWithEmailAndPassword(auth, leaderEmail, leaderPass);
                await setDoc(doc(db,"staff", userCred.user.uid), { uid:userCred.user.uid, name:"Super Leader", email:leaderEmail, role:"LEADER", shift:"Pagi" });
                console.log("Leader default dibuat: leader@hokbentoto.com / leader123");
            }catch(e){}
        }
    })();
    onAuthStateChanged(auth, async(user)=>{
        if(user && !currentUser){
            const staffDoc = await getDoc(doc(db,"staff", user.uid));
            if(staffDoc.exists()){
                currentUser = { uid:user.uid, email:user.email, name:staffDoc.data().name, role:staffDoc.data().role };
                document.getElementById('userRoleDisplay').innerText = `👤 ${currentUser.name} - ${currentUser.role}`;
                document.getElementById('loginWrapper').style.display = 'none';
                document.getElementById('dashboardPanel').style.display = 'block';
                await loadStaffData(); await loadIzinHistory();
                renderDashboard('izinKeluar');
            }
        } else if(!user && currentUser){
            currentUser = null;
            document.getElementById('loginWrapper').style.display = 'flex';
            document.getElementById('dashboardPanel').style.display = 'none';
        }
    });
</script>
